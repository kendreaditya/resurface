name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Prepare release artifact
        run: |
          PLUGIN_ID=$(node -p "require('./package.json').logseq.id")
          echo "PLUGIN_ID=$PLUGIN_ID" >> $GITHUB_ENV
          mkdir release
          cp -r dist/* release/
          node -e "
            const p = require('./package.json');
            p.main = 'index.html';
            delete p.scripts;
            delete p.devDependencies;
            require('fs').writeFileSync('release/package.json', JSON.stringify(p, null, 2));
          "
          cp icon.svg release/
          cp README.md release/ || true
          cd release && zip -r "../${PLUGIN_ID}.zip" .

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PLUGIN_ID }}.zip
          generate_release_notes: true
